<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Snehal</title>
    <style>
        @import url('https://googleapis.com');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #11091c;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 360px;
            height: 520px;
            perspective: 1500px;
            cursor: pointer;
        }

        /* Inside page holds the background message */
        .inside-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2a143d 0%, #170a24 100%);
            border: 2px solid #e2a4ff;
            border-radius: 16px;
            box-sizing: border-box;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .message-text {
            color: #f7efff;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            color: #ff94cf;
            text-shadow: 0 0 8px rgba(255, 148, 207, 0.5);
            margin-top: 15px;
        }

        /* Middle split front covers */
        .cover-half {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            background: linear-gradient(135deg, #1f1130 0%, #0d0414 100%);
            z-index: 2;
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
            overflow: hidden;
            box-sizing: border-box;
        }

        .left-cover {
            left: 0;
            border-radius: 16px 0 0 16px;
            border: 2px solid #e2a4ff;
            border-right: none;
            transform-origin: left center;
        }

        .right-cover {
            right: 0;
            border-radius: 0 16px 16px 0;
            border: 2px solid #e2a4ff;
            border-left: none;
            transform-origin: right center;
        }

        /* Splitting Animation Triggered by Class */
        .card-container.open .left-cover {
            transform: rotateY(-100deg);
        }

        .card-container.open .right-cover {
            transform: rotateY(100deg);
        }

        /* Beautiful Scenic Watercolor Background on Front Cover */
        .scenery-bg {
            position: absolute;
            width: 200%;
            height: 100%;
            /* Watercolor artistic style scenery: night gradient, moon glow, cherry blossoms */
            background: 
                radial-gradient(circle at 50% 30%, rgba(255, 235, 245, 0.15) 0%, transparent 50%),
                linear-gradient(to bottom, #110426, #2d124d, #632057, #bd5269);
            top: 0;
        }

        .left-cover .scenery-bg {
            left: 0;
        }

        .right-cover .scenery-bg {
            left: -100%;
        }

        /* Visual Elements on Cover */
        .art-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .left-cover .art-overlay {
            padding-left: 20px;
            align-items: flex-end;
        }

        .right-cover .art-overlay {
            padding-right: 20px;
            align-items: flex-start;
        }

        .title-part {
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            color: #fff;
            text-shadow: 0 0 12px #ff8bc4;
            margin: 0;
        }

        /* Floating artist/hobby elements */
        .hobby-icons {
            font-size: 26px;
            margin-top: 25px;
            display: flex;
            gap: 15px;
            animation: float 3s infinite ease-in-out;
            opacity: 0.9;
        }

        .korean-tag {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hint-text {
            position: absolute;
            bottom: 25px;
            width: 200%;
            text-align: center;
            color: #ffbde0;
            font-size: 13px;
            letter-spacing: 2px;
            animation: pulse 1.8s infinite;
            text-transform: uppercase;
        }

        .left-cover .hint-text { left: 0; }
        .right-cover .hint-text { left: -100%; }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="card-container" onclick="this.classList.toggle('open')">
    
    <!-- Inside Message Page (Stays Center Background) -->
    <div class="inside-page">
        <div class="message-text">
            <p>Happy Birthday! I hope you have a fantastic day filled with joy.</p>
            <p>I'm really enjoying getting to know you and am excited to see where this journey takes us.</p>
            <p>Wishing you a wonderful year ahead!</p>
        </div>
        <div class="signature">With love,<br>Pritesh</div>
    </div>

    <!-- Left Door Cover -->
    <div class="cover-half left-cover">
        <div class="scenery-bg"></div>
        <div class="art-overlay">
            <h1 class="title-part">Happy&nbsp;</h1>
            <div class="hobby-icons">🎨 💃</div>
            <div class="korean-tag">생일</div>
        </div>
        <div class="hint-text">Tap to Open Canvas</div>
    </div>

    <!-- Right Door Cover -->
    <div class="cover-half right-cover">
        <div class="scenery-bg"></div>
        <div class="art-overlay">
            <h1 class="title-part">Birthday</h1>
            <div class="hobby-icons">✨ 🎬</div>
            <div class="korean-tag">축하해요</div>
        </div>
        <div class="hint-text">Tap to Open Canvas</div>
    </div>

</div>

</body>
</html>
