html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>With Warmth, Pritesh</title>
    <style>
        :root {
            --bg-color: #12100e;
            --wood-texture: radial-gradient(circle, #2a1f17 0%, #140d0a 100%);
            --card-bg: #fcfaf2;
            --text-color: #2b2621;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            background-image: var(--wood-texture);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Ambient Instruction Text */
        .instruction {
            color: #a4968a;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.7;
            pointer-events: none;
            font-weight: 300;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* Container holding the 3D book system */
        .book-container {
            position: relative;
            width: 900px;
            height: 550px;
            cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-radius: 4px;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        /* Absolute positioning helper for all book panels */
        .page {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            transform-style: preserve-3d;
            transition: transform 1.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Left Side Base (Inside Left) */
        .left-base {
            left: 0;
            background: var(--card-bg);
            border-radius: 4px 0 0 4px;
            border-right: 1px solid rgba(0,0,0,0.1);
            z-index: 1; /* Kept lower so covers stack on top */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset -20px 0 30px rgba(0,0,0,0.05);
        }

        /* Right Side Base (Inside Right) */
        .right-base {
            left: 50%;
            background: var(--card-bg);
            border-radius: 0 4px 4px 0;
            z-index: 1; /* Kept lower so covers stack on top */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 20px 0 30px rgba(0,0,0,0.05);
        }

        /* The Animated Moving Flaps */
        .left-flap {
            left: 0;
            transform-origin: right center;
            z-index: 5; /* Higher stacking order so it hides inner pages first */
        }

        .right-flap {
            left: 50%;
            transform-origin: left center;
            z-index: 5; /* Higher stacking order so it hides inner pages first */
        }

        /* Front/Back Faces of Flaps */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
        }

        .back {
            background: var(--card-bg);
            transform: rotateY(180deg);
        }

        /* --- COVER STYLING (The Triptych Scenes) --- */
        .scene-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 8px solid var(--card-bg);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
        }

        .left-flap .front .scene-container {
            border-radius: 4px 0 0 4px;
        }

        .right-flap .front .scene-container {
            border-radius: 0 4px 4px 0;
        }

        /* Horizontal Split for Left Flap (Scene 1 & 2) */
        .split-scene {
            height: 50%;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--card-bg);
        }
        .split-scene:last-child {
            border-bottom: none;
        }

        /* SVGs styling to look watercolor-esque */
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- INSIDE LAYER STYLING --- */
        .letter-content {
            padding: 50px 40px 50px 60px;
            color: var(--text-color);
            line-height: 1.8;
            font-size: 1.15rem;
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-base .letter-content {
            padding: 50px 65px 50px 45px;
        }

        /* Dynamic Image Styling on Left Page */
        .snehal-photo {
            max-width: 85%;
            max-height: 80%;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 8px solid #ffffff;
            opacity: 0;
            transform: translateY(15px) scale(0.98);
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .letter-content p {
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .letter-content .heading-name {
            font-size: 1.6rem;
            font-weight: normal;
            margin-bottom: 5px;
            color: #1a1715;
        }

        .letter-content .bday-text {
            font-size: 1.3rem;
            font-style: italic;
            color: #c0392b;
            margin-bottom: 25px;
        }

        .signature {
            font-family: 'Brush Script MT', 'Great Vibes', cursive;
            font-size: 2.6rem;
            margin-top: 15px;
            text-align: right;
            color: #5c4d43;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- INTERACTION STATES (OPEN BOOK) --- */
        .book-container.open .left-flap {
            transform: rotateY(-180deg);
            z-index: 1; /* Push beneath inner panels when turned open */
        }

        .book-container.open .right-flap {
            transform: rotateY(180deg);
            z-index: 1; /* Push beneath inner panels when turned open */
        }

        /* Fade contents smoothly on open */
        .book-container.open .snehal-photo,
        .book-container.open .letter-content p,
        .book-container.open .signature {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Smooth staggered timing layout */
        .book-container.open .snehal-photo { transition-delay: 0.6s; }
        .book-container.open .right-base .letter-content p:nth-child(1) { transition-delay: 0.8s; }
        .book-container.open .right-base .letter-content p:nth-child(2) { transition-delay: 1.1s; }
        .book-container.open .right-base .letter-content p:nth-child(3) { transition-delay: 1.5s; }
        .book-container.open .right-base .letter-content p:nth-child(4) { transition-delay: 1.9s; }
        .book-container.open .signature { transition-delay: 2.4s; }

        /* --- PARTICLE CANVAS LAYER --- */
        #petalCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="instruction" id="instructText">Tap the card to open</div>

    <div class="book-container" id="book" onclick="toggleBook()">
        
        <!-- CANVAS FOR ANIMATED AMBIENT ELEMENTS -->
        <canvas id="petalCanvas"></canvas>

        <!-- PAGE 1: STATIC INSIDE LEFT PAGE (Holds her Photo) -->
        <div class="page left-base">
            <div class="letter-content" style="padding: 30px; align-items: center; width: 100%;">
                <img src="snehal-photo.jpg" alt="Snehal" class="snehal-photo">
            </div>
        </div>

        <!-- PAGE 2: STATIC INSIDE RIGHT PAGE (Holds your Message) -->
        <div class="page right-base">
            <div class="letter-content" style="justify-content: flex-start; padding-top: 60px;">
                <p class="heading-name">For the wonderful</p>
                <p class="bday-text">Snehal,</p>
                <p>Happy Birthday! I hope you have a fantastic day filled with joy.</p>
                <p>I'm really enjoying getting to know you and am excited to see where this journey takes us.</p>
                <p>Wishing you a wonderful year ahead!</p>
                <div class="signature" style="margin-top: 10px;">With love,<br>Pritesh</div>
            </div>
        </div>

        <!-- MOVING LEFT FLAP (Scene 1 & Scene 2 on Front) -->
        <div class="page left-flap" id="leftFlap">
            <div class="face front">
                <!-- Scene 1: The Dancer -->
                <div class="split-scene">
                    <svg viewBox="0 0 450 275">
                        <defs>
                            <linearGradient id="sky-1" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#0b091a"/>
                                <stop offset="60%" stop-color="#18153c"/>
                                <stop offset="100%" stop-color="#2c224d"/>
                            </linearGradient>
