<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>With Warmth, Pritesh</title>
    <style>
        :root {
            --bg-color: #12100e;
            --wood-texture: radial-gradient(circle, #2a1f17 0%, #140d0a 100%);
            --card-bg: #fcfaf2;
            --text-color: #2b2621;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            background-image: var(--wood-texture);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Ambient Instruction Text */
        .instruction {
            color: #a4968a;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 300;
            animation: pulse 2s infinite alternate;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* Container holding the 3D book system */
        .book-container {
            position: relative;
            width: 450px; /* Width of one page */
            height: 550px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
            /* Shift the container to the center when open */
            transform: translateX(0);
        }

        .book-container.open {
            transform: translateX(50%);
        }

        /* FIXED: Absolute positioning with backface-visibility for smooth turning */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 0 4px 4px 0;
        }

        /* Front and Back of each page layer */
        .page-side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            padding: 40px;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-color);
        }

        /* Cover Front */
        .front {
            z-index: 2;
        }

        /* Cover Inside Left */
        .back {
            transform: rotateY(180deg);
            background: #f7f4e9; /* Slightly darker shade for realistic depth */
            border-radius: 4px 0 0 4px;
        }

        /* Base Right Page (Stays flat inside) */
        .base-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: var(--card-bg);
            padding: 40px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 0 4px 4px 0;
            /* Creates a shadow down the center crease */
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 10%);
        }

        /* Flip the cover page when active */
        .book-container.open .page {
            transform: rotateY(-180deg);
        }
    </style>
</head>
<body>

    <div class="instruction" id="instruction-text">Tap the card to open</div>

    <div class="book-container" id="card">
        <!-- Flipping Cover Page -->
        <div class="page">
            <!-- Outside Front Cover -->
            <div class="page-side front">
                <h1>Happy Holidays</h1>
                <p style="margin-top: 15px; font-style: italic; opacity: 0.7;">Click to see inside</p>
            </div>
            <!-- Inside Left Page -->
            <div class="page-side back">
                <h2>Dear Friend,</h2>
                <p style="margin-top: 20px; line-height: 1.6;">Wishing you a wonderful season filled with joy, peace, and laughter.</p>
            </div>
        </div>

        <!-- Static Right Inside Page -->
        <div class="base-page">
            <p style="line-height: 1.6;">May the coming year bring you success and happiness in everything you do.</p>
            <p style="margin-top: 40px; font-weight: bold;">With Warmth,<br>Pritesh</p>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const instruction = document.getElementById('instruction-text');

        card.addEventListener('click', () => {
            card.classList.toggle('open');
            
            if (card.classList.contains('open')) {
                instruction.textContent = "Tap the card to close";
            } else {
                instruction.textContent = "Tap the card to open";
            }
        });
    </script>
</body>
</html>
