<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For The Wonderful Snehal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #12100e;
            --wood-texture: radial-gradient(circle, #2a1f17 0%, #140d0a 100%);
            --card-bg: #fff5f8;
            --primary-purple: #7a1fa2;
            --text-dark: #2c252b;
            --text-muted: #8e7c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-color);
            background-image: var(--wood-texture);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
            position: relative;
        }

        /* Ambient Instruction Text */
        .instruction {
            color: #a4968a;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 400;
            animation: pulse 2s infinite alternate;
            z-index: 100;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* 3D Card Book Container */
        .book-container {
            position: relative;
            width: 450px; 
            height: 550px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
            transform: translateX(0);
            z-index: 10;
        }

        .book-container.open {
            transform: translateX(50%);
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.35);
            border-radius: 0 16px 16px 0;
            z-index: 5;
        }

        .page-side {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Front Page Cover Fixes */
        .front {
            z-index: 2;
            padding: 0 !important;
            overflow: hidden;
            border-radius: 0 16px 16px 0;
            background: #fff5f8;
        }

        .cover-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Inside Left Page Backing */
        .back {
            transform: rotateY(180deg);
            background: #fff0f5; 
            border-radius: 16px 0 0 16px;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Inside Right Panel Hidden Layer Fixes */
        .base-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: var(--card-bg);
            padding: 50px 40px;
            z-index: 1; /* Kept behind the closed page leaf */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: var(--text-dark);
            box-shadow: 0 10px 40px rgba(0,0,0,0.35);
            border-radius: 0 16px 16px 0;
            background-image: linear-gradient(to right, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0) 8%);
        }

        /* Staggered Text Animations */
        .fade-item {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .book-container.open .fade-item {
            opacity: 1;
            transform: translateY(0);
        }

        .book-container.open .delay-1 { transition-delay: 0.4s; }
        .book-container.open .delay-2 { transition-delay: 0.7s; }
        .book-container.open .delay-3 { transition-delay: 1.0s; }

        /* Typography Styles */
        .sub-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .name-title {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--primary-purple);
            line-height: 1.2;
            margin-bottom: 25px;
        }

        .message-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dark);
            font-weight: 300;
            max-width: 340px;
        }

        .message-paragraph {
            margin-bottom: 25px;
        }

        .highlight-text {
            color: var(--primary-purple);
            font-weight: 500;
        }

        .signature-block {
            margin-top: 20px;
        }

        .closing {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .signature-name {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: var(--primary-purple);
            line-height: 1.1;
        }

        .book-container.open .page {
            transform: rotateY(-180deg);
        }

        /* Falling Particles */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            top: -20px;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg) translateX(150px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="particle-container" id="particle-box"></div>

    <div class="instruction" id="instruction-text">Tap the card to open</div>

    <div class="book-container" id="card">
        <!-- Flipping Cover Leaf -->
        <div class="page">
            <div class="page-side front">
                <img src="snehal-photo.jpg" alt="For Snehal" class="cover-photo">
            </div>
            <div class="page-side back"></div>
        </div>

        <!-- Inside Right Panel (Kept separate so it stays hidden under the cover) -->
        <div class="base-page">
            <div class="fade-item delay-1">
                <p class="sub-header">For the wonderful</p>
                <h1 class="name-title">Snehal</h1>
            </div>

            <div class="message-content fade-item delay-2">
                <p class="message-paragraph">
                    Happy Birthday! I hope you have a <span class="highlight-text">fantastic day</span> filled with joy.
                </p>
                <p class="message-paragraph">
                    I'm really enjoying getting to know you and am excited to see where this <span class="highlight-text">journey</span> takes us.
                </p>
                <p class="message-paragraph" style="margin-bottom: 0;">
                    Wishing you a <span class="highlight-text">wonderful year ahead!</span>
                </p>
            </div>

            <div class="signature-block fade-item delay-3">
                <p class="closing">With Love,</p>
                <h2 class="signature-name">Pritesh</h2>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const instruction = document.getElementById('instruction-text');
        const particleBox = document.getElementById('particle-box');

        card.addEventListener('click', () => {
            card.classList.toggle('open');
            if (card.classList.contains('open')) {
                instruction.textContent = "Tap the card to close";
            } else {
                instruction.textContent = "Tap the card to open";
            }
        });

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const items = ['🌸', '💖', '💕', '✨'];
            particle.textContent = items[Math.floor(Math.random() * items.length)];
            
            const size = Math.random() * 15 + 12;
            particle.style.fontSize = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            
            const duration = Math.random() * 3 + 2; 
            particle.style.animationDuration = `${duration}s`;
            particle.style.opacity = Math.random() * 0.6 + 0.4;
            
            particleBox.appendChild(particle);

            setTimeout(() => {
                particle.remove();
