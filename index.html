<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Snehal</title>
    <style>
        @import url('https://googleapis.com');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a0826;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 350px;
            height: 500px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Opening effect */
        .card.opened {
            transform: rotateY(180deg);
        }

        .front, .inside-left, .inside-right {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Front Page Styling */
        .front {
            background: linear-gradient(135deg, #2e104f, #1e052c);
            border: 3px solid #dfa6e8;
            z-index: 2;
        }

        .k-drama-ribbon {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: #ff9ebb;
            font-size: 20px;
        }

        .interests-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .dancing-icon {
            font-size: 40px;
            animation: sway 2s infinite ease-in-out;
        }

        .sketch-icon {
            font-size: 40px;
            color: #8be3ff;
            animation: sketchDraw 3s infinite ease-in-out;
        }

        .front-title {
            color: #ffffff;
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            margin-top: 15px;
            text-shadow: 0 0 10px #ff75c3;
        }

        .korean-text {
            color: #ffd666;
            font-weight: 500;
            font-size: 18px;
            margin-top: 5px;
        }

        /* Inside Message Styling */
        .inside-left {
            background: linear-gradient(135deg, #1e052c, #2e104f);
            transform: rotateY(180deg);
            z-index: 1;
            border: 3px solid #ff75c3;
        }

        .inside-right {
            background: linear-gradient(135deg, #2e104f, #1e052c);
            transform: rotateY(180deg);
            z-index: 3;
            border: 3px solid #ff75c3;
            padding: 30px;
            text-align: center;
        }

        .message-text {
            color: #ffffff;
            font-size: 16px;
            line-height: 1.6;
            font-weight: 300;
        }

        .sender-name {
            margin-top: 25px;
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: #dfa6e8;
            font-weight: bold;
        }

        .tap-instruction {
            position: absolute;
            bottom: 15px;
            color: #dfa6e8;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        /* Keyframe Animations */
        @keyframes sway {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(10deg) translateY(-5px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes sketchDraw {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(3deg); }
        }
    </style>
</head>
<body>

<div class="card-container" onclick="toggleCard()">
    <div class="card" id="birthdayCard">
        <!-- Front Cover -->
        <div class="front">
            <div class="k-drama-ribbon">🎬🌸🎬</div>
            <div class="interests-container">
                <div class="dancing-icon">💃🎶</div>
                <div class="sketch-icon">🎨✏️</div>
            </div>
            <div class="front-title">For Snehal</div>
            <div class="korean-text">생일 축하해요!</div>
            <div class="tap-instruction">Tap to open card ✨</div>
        </div>

        <!-- Inside - Left Flap -->
        <div class="inside-left"></div>

        <!-- Inside - Right Flap (The Message) -->
        <div class="inside-right">
            <div class="message-text">
                Happy Birthday! I hope you have a fantastic day filled with joy. I’m really enjoying getting to know you and am excited to see where this journey takes us. Wishing you a wonderful year ahead!
            </div>
            <div class="sender-name">With best wishes, Pritesh</div>
        </div>
    </div>
</div>

<script>
    function toggleCard() {
        var card = document.getElementById('birthdayCard');
        card.classList.toggle('opened');
    }
</script>

</body>
</html>
